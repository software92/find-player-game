name: Deploy to GitHub Pages

on:
  push:
    # deploy -> master (배포 브랜치 변경)
    branches: [master]
    # 테스트 브랜치
    # branches: [feat/migrate-to-functions]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 에디터 린트 오류 방지를 위해 따옴표 추가
    env:
      'VITE_FIREBASE_API_KEY': '${{ secrets.VITE_FIREBASE_API_KEY }}'
      'VITE_FOOTBALL_API_KEY': '${{ secrets.VITE_FOOTBALL_API_KEY }}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd functions && npm install  # functions 폴더 내부 의존성 설치 필수!

      - name: Sync shared directory to functions
        run: |
          # 기존 링크 삭제
          rm -rf functions/shared
          # 실제 폴더 복사
          cp -r shared functions/shared
      - name: Build project
        run: |
          npm run build
          # functions 빌드 (경로 에러가 나도 중단되지 않게 처리하려면 || true 사용)
          # cd functions && (npm run build || true)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    # 오직 master 브랜치에 push(merge 포함)되었을 때만 실제 배포 수행
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
